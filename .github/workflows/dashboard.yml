name: NYPost QA Dashboard (GitHub Pages)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"    # runs hourly — customize as needed

permissions:
  contents: write           # required for committing to /docs
  pages: write              # required by GH Pages
  id-token: write

jobs:
  run-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          ZAPIER_WEBHOOK_URL: ${{ vars.ZAPIER_WEBHOOK_URL }}
          USER_AGENT: NYPost-QA-OptionB/1.0 (+QA)
          TIMEOUT: '20'
          HEADLINES_LIMIT: '30'
          OFFLINE: 'false'

          # Enable debug dumps (HTML/JSON)
          DEBUG_DUMPS: 'true'
          WEB_SECTIONS: "news,metro,sports,page-six"
          INCLUDE_LATEST: 'true'
        run: |
          python scraper.py

      # Copy dashboard + debug into /docs for GitHub Pages
      - name: Stage dashboard for GitHub Pages
        run: |
          mkdir -p docs
          mkdir -p docs/data-debug
          cp -f dashboard.html docs/index.html
          if [ -d docs/data-debug-src ]; then
            cp -rf docs/data-debug-src/* docs/data-debug/
          fi

      # Commit /docs to main (which Pages will serve)
      - name: Commit dashboard and debug files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"

          git add docs/index.html docs/data-debug

          if ! git diff --cached --quiet; then
            git commit -m "Update dashboard $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          else
            echo "No updated dashboard to commit."
          fi

      # Upload debug artifacts for inspection in Actions UI
      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nypost-debug-files
          path: |
            docs/data-debug-src/**
            docs/data-debug/**
          if-no-files-found: warn
